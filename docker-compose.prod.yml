services:
  db:
    image: postgres:16-alpine
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
    command: sh -c "python manage.py collectstatic --noinput && gunicorn config.wsgi:application -c gunicorn.conf.py"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  backend-ws:
    build:
      context: ./backend
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery:
    build:
      context: ./backend
    command: celery -A config.celery worker -l info
    network_mode: host
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0
      REDIS_URL: redis://127.0.0.1:6379/0
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
    command: celery -A config.celery beat -l info
    network_mode: host
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  flower:
    build:
      context: ./backend
    command: celery -A config.celery flower --port=5555
    network_mode: host
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
    depends_on:
      redis:
        condition: service_started
      celery:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://aspectfy.ru/api/v1}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/var/lib/static:ro
      - media_volume:/var/lib/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - backend-ws
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
