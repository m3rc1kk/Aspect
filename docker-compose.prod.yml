services:
  db:
    image: postgres:16-alpine
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    env_file:
      - backend/.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
    command: sh -c "python manage.py collectstatic --noinput && gunicorn config.wsgi:application -c gunicorn.conf.py"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  backend-ws:
    build:
      context: ./backend
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery:
    build:
      context: ./backend
    command: celery -A config.celery worker -l info
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
    depends_on:
      - backend
      - rabbitmq
      - redis
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
    command: celery -A config.celery beat -l info
    env_file:
      - backend/.env
    environment:
      DJANGO_ENV: prod
    depends_on:
      - backend
      - rabbitmq
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - backend-ws
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
