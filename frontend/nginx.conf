server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }

    
    location / {
        try_files $uri /index.html;
    }
}
